z<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ITZYATHU_12 Editz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1f2d 50%, #1a1a1a 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        
        /* Header */
        header {
            background: linear-gradient(90deg, #8b0050 0%, #d4145a 50%, #8b0050 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(212, 20, 90, 0.4);
        }
        
        .logo {
            font-size: 1.8em;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .logo img {
            height: 60px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.95em;
            transition: color 0.3s;
        }
        
        nav a:hover {
            color: #ff69b4;
        }
        
        /* Main Content */
        .container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
        }
        
        .signup-card {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #d4145a;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(212, 20, 90, 0.3);
        }
        
        .signup-card h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #ff69b4, #d4145a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ff69b4;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #d4145a;
            border-radius: 10px;
            background: #1a1a1a;
            color: white;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 15px rgba(212, 20, 90, 0.3);
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(90deg, #8b0050, #d4145a);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background: linear-gradient(90deg, #d4145a, #ff69b4);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(212, 20, 90, 0.5);
        }
        
        .signin-link {
            text-align: center;
            margin-top: 20px;
            color: #999;
        }
        
        .signin-link a {
            color: #ff69b4;
            text-decoration: none;
        }
        
        .signin-link a:hover {
            text-decoration: underline;
        }
        
        /* Footer */
        footer {
            background: #0d0d0d;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://res.cloudinary.com/dl22okpfz/image/upload/v1782126724/transparent_logo_ydjzjv.png" alt="ITZYATHU_12 Editz" style="height: 50px;">
        </div>
        <nav>
            <a href="https://itzyathu12editz.netlify.app/">Home</a>
            <a href="#">Services</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>
            <a href="https://itzyathu12editz.netlify.app/signin.html">Sign In</a>
        </nav>
    </header>
    
    <div class="container">
        <div class="signup-card">
            <h1>Sign Up</h1>
            
            <!-- Hidden Netlify form for collecting users -->
            <form name="signup" netlify hidden>
                <input type="text" name="name">
                <input type="email" name="email">
                <input type="password" name="password">
            </form>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="submit-btn">Sign Up</button>
            </form>
            <p id="signupMessage" style="text-align:center; margin-top:15px; color:#ff69b4;"></p>
            <p class="signin-link">Already have an account? <a href="https://itzyathu12editz.netlify.app/signin.html">Sign In</a></p>
        </div>
    </div>
    
   <footer>
        <p>© 2026 ITZYATHU_12 Editz. All rights reserved.</p>
        <span class="dev-note">(This site is under development. We are working on improving the user experience.)</span>
    </footer>
    
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Get existing users or start fresh
            let users = JSON.parse(localStorage.getItem('itzyathu_users') || '[]');
            
            // Check if email already exists
            if (users.find(u => u.email === email)) {
                document.getElementById('signupMessage').textContent = 'Email already registered!';
                return;
            }
            
            // Add new user
            users.push({ name, email, password });
            localStorage.setItem('itzyathu_users', JSON.stringify(users));
            
            // Submit to Netlify Forms
            const netlifyForm = document.querySelector('form[name="signup"]');
            const formData = new FormData();
            formData.append('name', name);
            formData.append('email', email);
            formData.append('password', password);
            
            fetch('/', {
                method: 'POST',
                body: formData
            }).catch(err => console.log('Netlify form submitted'));
            
            document.getElementById('signupMessage').textContent = 'Account created! Redirecting to sign in...';
            setTimeout(() => {
                window.location.href = 'https://itzyathu12editz.netlify.app/signin.html';
            }, 1500);
        });
    </script>
</body>
</html>
