<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ITZYATHU_12 Editz</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1f2d 50%, #1a1a1a 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        
        /* Header */
        header {
            background: linear-gradient(90deg, #8b0050 0%, #d4145a 50%, #8b0050 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(212, 20, 90, 0.4);
        }
        
        .logo {
            font-size: 1.8em;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .logo img {
            height: 60px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.95em;
            transition: color 0.3s;
        }
        
        nav a:hover {
            color: #ff69b4;
        }
        
        /* Main Content */
        .container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
        }
        
        .login-card {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #d4145a;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(212, 20, 90, 0.3);
        }
        
        .login-card h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #ff69b4, #d4145a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ff69b4;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #d4145a;
            border-radius: 10px;
            background: #1a1a1a;
            color: white;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 15px rgba(212, 20, 90, 0.3);
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(90deg, #8b0050, #d4145a);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background: linear-gradient(90deg, #d4145a, #ff69b4);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(212, 20, 90, 0.5);
        }
        
        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #999;
        }
        
        .signup-link a {
            color: #ff69b4;
            text-decoration: none;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        /* Footer */
        footer {
            background: #0d0d0d;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://res.cloudinary.com/dl22okpfz/image/upload/v1782126724/transparent_logo_ydjzjv.png" alt="ITZYATHU_12 Editz" style="height: 50px;">
        </div>
        <nav>
            <a href="https://itzyathu.netlify.app/">Home</a>
            <a href="#">Services</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>
            <a href="https://itzyathu.netlify.app/signin.html">Sign In</a>
        </nav>
    </header>
    
    <div class="container">
        <div class="login-card">
            <h1>Sign In</h1>
            <form id="signinForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>
            <p id="signinMessage" style="text-align:center; margin-top:15px; color:#ff69b4;"></p>
            <p class="signup-link">Don't have an account? <a href="https://itzyathu.netlify.app/signup.html">Sign Up</a></p>
        </div>
    </div>
    
    <footer>
        <p>© 2026 ITZYATHU_12 Editz. All rights reserved.</p>
        <span class="dev-note">(This site is under development. We are working on improving the user experience.)</span>
    </footer>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCy4q5K8xZ9m2pQ7w1rN6jK3lV8sT5uB9D",
            authDomain: "itzyathu12-editz.firebaseapp.com",
            projectId: "itzyathu12-editz",
            storageBucket: "itzyathu12-editz.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456ghi789"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Get users from localStorage
            let users = JSON.parse(localStorage.getItem('itzyathu_users') || '[]');
            
            // Find user
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                try {
                    // Save user login to Firebase Firestore
                    await db.collection('users').doc(user.email).set({
                        name: user.name,
                        email: user.email,
                        lastLogin: new Date(),
                        status: 'active'
                    }, { merge: true });
                    
                    // Save current user session in localStorage
                    localStorage.setItem('itzyathu_current_user', JSON.stringify(user));
                    document.getElementById('signinMessage').textContent = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'https://itzyathu.netlify.app/';
                    }, 1000);
                } catch (error) {
                    console.error('Error saving to Firebase:', error);
                    // Still allow login even if Firebase fails
                    localStorage.setItem('itzyathu_current_user', JSON.stringify(user));
                    document.getElementById('signinMessage').textContent = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'https://itzyathu.netlify.app/';
                    }, 1000);
                }
            } else {
                document.getElementById('signinMessage').textContent = 'Invalid email or password!';
            }
        });
    </script>
</body>
</html>
