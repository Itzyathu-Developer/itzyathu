<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users List - Admin Panel</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1f2d 50%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(90deg, #8b0050 0%, #d4145a 50%, #8b0050 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(212, 20, 90, 0.4);
            margin-bottom: 30px;
            border-radius: 10px;
        }
        
        .logo {
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .back-link {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #ff69b4;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #ff69b4, #d4145a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid #d4145a;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #ff69b4;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
        }
        
        .table-container {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid #d4145a;
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: linear-gradient(90deg, #8b0050, #d4145a);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #444;
            color: #ccc;
        }
        
        tr:hover {
            background: rgba(212, 20, 90, 0.1);
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .refresh-btn {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .status-active {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #444;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">👥 Users Admin Panel</div>
        <a href="https://itzyathu.netlify.app/" class="back-link">← Back to Home</a>
    </header>
    
    <div class="container">
        <h1>Registered Users</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Active Users</h3>
                <div class="stat-value" id="activeUsers">0</div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadUsers()">🔄 Refresh Users</button>
        
        <div class="table-container">
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <p>Loading users...</p>
            </div>
            
            <div id="usersList" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Last Login</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>
            
            <div id="noData" class="no-data" style="display: none;">
                <p>No users found yet.</p>
            </div>
        </div>
    </div>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCy4q5K8xZ9m2pQ7w1rN6jK3lV8sT5uB9D",
            authDomain: "itzyathu12-editz.firebaseapp.com",
            projectId: "itzyathu12-editz",
            storageBucket: "itzyathu12-editz.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456ghi789"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadUsers() {
            try {
                const loading = document.getElementById('loading');
                const usersList = document.getElementById('usersList');
                const noData = document.getElementById('noData');
                const tbody = document.getElementById('usersTableBody');
                
                loading.style.display = 'block';
                usersList.style.display = 'none';
                noData.style.display = 'none';
                
                // Get all users without orderBy to avoid index requirement
                const snapshot = await db.collection('users').get();
                const users = [];
                
                snapshot.forEach(doc => {
                    users.push(doc.data());
                });
                
                // Sort by lastLogin on client side
                users.sort((a, b) => {
                    const timeA = a.lastLogin ? a.lastLogin.toDate().getTime() : 0;
                    const timeB = b.lastLogin ? b.lastLogin.toDate().getTime() : 0;
                    return timeB - timeA;
                });
                
                loading.style.display = 'none';
                
                document.getElementById('totalUsers').textContent = users.length;
                document.getElementById('activeUsers').textContent = users.length;
                
                if (users.length === 0) {
                    noData.style.display = 'block';
                } else {
                    usersList.style.display = 'block';
                    tbody.innerHTML = users.map(user => {
                        const lastLogin = user.lastLogin 
                            ? new Date(user.lastLogin.toDate()).toLocaleString() 
                            : 'Never';
                        return `
                            <tr>
                                <td>${user.name || 'N/A'}</td>
                                <td>${user.email}</td>
                                <td>${lastLogin}</td>
                                <td><span class="status-badge status-active">${user.status || 'active'}</span></td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('noData').style.display = 'block';
                document.getElementById('noData').innerHTML = `<p>Error: ${error.message}<br/>Check browser console for details.</p>`;
            }
        }

        // Load users when page loads
        window.addEventListener('load', loadUsers);
    </script>
</body>
</html>
